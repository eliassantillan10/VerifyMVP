name: verifymvp

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-verifymvp}
      POSTGRES_USER: ${POSTGRES_USER:-verifymvp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-verifymvp}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-verifymvp}:${POSTGRES_PASSWORD:-verifymvp}@db:5432/${POSTGRES_DB:-verifymvp}"
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-insecure-dev-only-secret-key}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-true}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,backend}
      DJANGO_CORS_ALLOWED_ORIGINS: ${DJANGO_CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
      DJANGO_CSRF_TRUSTED_ORIGINS: ${DJANGO_CSRF_TRUSTED_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
      CASE_BREAKER_LLM_ENABLED: ${CASE_BREAKER_LLM_ENABLED:-true}
      CASE_BREAKER_LLM_MODEL: ${CASE_BREAKER_LLM_MODEL:-llama3.2:3b-instruct-q4_K_M}
      OLLAMA_BASE_URL: http://ollama:11434
    command: >
      sh -c "python manage.py migrate --noinput &&
      gunicorn config.wsgi:application --bind 0.0.0.0:8000"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_PROXY_TARGET: http://backend:8000
    depends_on:
      - backend
    ports:
      - "5173:5173"

  ollama:
    image: ollama/ollama:latest
    environment:
      CASE_BREAKER_LLM_MODEL: ${CASE_BREAKER_LLM_MODEL:-llama3.2:3b-instruct-q4_K_M}
    volumes:
      - ollama-data:/root/.ollama
    command: >
      sh -c "ollama serve & sleep 2 && ollama pull $${CASE_BREAKER_LLM_MODEL:-llama3.2:3b-instruct-q4_K_M} && wait"
    ports:
      - "11434:11434"

volumes:
  postgres-data:
  ollama-data:
